function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function searchByTag(tag) {
    window.location.href = 'index.html?tag=' + encodeURIComponent(tag);
}

function getUrlParams() {
    const params = new URLSearchParams(window.location.search);
    return { id: params.get('id') };
}

function initTheme() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('theme-toggle').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
    document.getElementById('theme-toggle').addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        document.getElementById('theme-toggle').textContent = newTheme === 'dark' ? '☀️' : '🌙';
    });
}

function initMobileMenu() {
    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');
    btn.addEventListener('click', () => {
        menu.classList.toggle('active');
    });
}

function initPost() {
    const { id } = getUrlParams();
    const post = posts.find(p => p.id === parseInt(id));
    if (!post) {
        document.getElementById('content').innerHTML = '<p>文章不存在</p>';
        return;
    }
    document.getElementById('content').innerHTML = '<article class="post-detail"><h1>' + escapeHtml(post.title) + '</h1><div class="post-meta"><span>📅 ' + post.date + '</span><span>📁 ' + post.category + '</span></div><div class="post-content">' + post.content + '</div><div class="post-tags">' + post.tags.map(tag => '<span class="tag" onclick="searchByTag(\'' + escapeHtml(tag) + '\')">' + escapeHtml(tag) + '</span>').join('') + '</div></article><div class="comments"><h3>💬 评论</h3><p>评论功能开发中... 可在 <a href="https://github.com/lucky-xing/lucky-xing.github.io/issues" target="_blank">GitHub Issues</a> 留言</p></div>';
}

document.addEventListener('DOMContentLoaded', () => {
    initTheme();
    initMobileMenu();
    initPost();
});
