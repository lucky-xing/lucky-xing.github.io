function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

const container = document.getElementById('posts-list');

    return '<article class="post">' +
        '<span class="post-date">' + post.date + ' · ' + post.category + '</span>' +
        '<h2 class="post-title"><a href="' + link + '">' + escapeHtml(post.title) + '</a></h2>' +
        '<p class="post-excerpt" style="color:#666;font-size:14px;margin:8px 0;">' + escapeHtml(post.excerpt) + '</p>' +
        '<div class="post-tags">' + post.tags.map(tag => '<span class="tag">' + escapeHtml(tag) + '</span>').join('') + '</div>' +
